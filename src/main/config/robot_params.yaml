/**:
  ros__parameters:
    logger_service_name: "/record_data"
    is_recording_topic: "/is_recording"

ll_control:
  ll_control_node:
    ros__parameters:
      mode_hold_name: "HOLD"

      # Output Mapping (Override Channels)
      output_ch_fwd: 8
      output_ch_lat: 9
      output_ch_turn: 10

      # Velocity Limits & PID
      pid_vel_x:
        max_output: 1.0 # m/s (Max Physical Velocity)
        k_p: 0.0         # Feedforward only
        k_i: 0.0
        k_d: 0.0
        k_ff: 1.0       # 1.0 m/s -> 1.0 Normalized Output (Full Power)

      pid_vel_y:
        max_output: 1.0 # m/s
        k_p: 0.0
        k_i: 0.0
        k_d: 0.0
        k_ff: 1.0

      pid_yaw_rate:
        max_output: 1.57 # rad/s (~90 deg/s)
        k_p: 0.15         # 1.0 rad/s error -> 1.0 Normalized Effort
        k_i: 0.0
        k_d: 0.0
        k_ff: 0.7

      # Safety
      cmd_vel_timeout_threshold: 0.5 # seconds
      imu_timeout_threshold: 0.2
      imu_fix_period: 2.0
      imu_freq_threshold: 0.9
      imu_target_freq: 50.0

teleop_interface:
  controller_interface_node:
    ros__parameters:
      # Mode Switching (RC Channel PWM)
      input_ch_mode: 4          # Channel 5 (0-indexed)
      mode_pwm_manual_threshold: 1300
      mode_pwm_auto_threshold: 1700

      # Input Channels (RC Receiver, 0-indexed)
      input_ch_fwd: 1   # Pitch
      input_ch_lat: 0   # Roll
      input_ch_yaw: 3   # Yaw

      # Deadband (normalized 0..1)
      input_deadband: 0.05

      # Velocity limits in VELOCITY mode (full stick = these values)
      vel_max_linear: 1.0   # m/s
      vel_max_angular: 1.57 # rad/s (~90 deg/s)

      # Controller watchdog: throttle channel holds this PWM value when transmitter is off
      throttle_ch: 2
      throttle_idle_value: 900

data_logging:
  bag_recorder:
    ros__parameters:
      bag_path: src/data_logging/rosbags
      log_topics: ["/mocap/opendubs/pose", "/mocap/opendubs/odom", "/mavros/local_position/pose", "/mavros/local_position/odom", "/mavros/imu/data"]
      max_record_duration: 300

mavros_params_loader:
  param:
    ros__parameters:
      # SERVO[output channel]_FUNCTION: 51 + [input channel]
      # corresponds to override channels
      SERVO1_FUNCTION: 36 # FL
      SERVO2_FUNCTION: 33 # FR
      SERVO3_FUNCTION: 34 # BL
      SERVO4_FUNCTION: 35 # BR

      RCMAP_ROLL: 10 # lat (output channel 9)
      RCMAP_YAW: 11 # yaw (output channel 10)
      RCMAP_THROTTLE: 9 # fwd (output channel 8)

      RC1_TRIM: 1500
      RC2_TRIM: 1500
      RC3_TRIM: 1500
      RC4_TRIM: 1500

      MODE_CH: 5
      MODE1: 0
      MODE2: 0
      MODE3: 0
      MODE4: 0
      MODE5: 0
      MODE6: 0

      INS_POS1_X: 0.1
      INS_POS1_Y: -0.17
      INS_POS1_Z: 0.0

      FLOW_TYPE: 5
      FLOW_POS_X: 0.18
      FLOW_POS_Y: -0.1
      FLOW_POS_Z: 0.0

      FS_ACTION: 2
      FS_GCS_ENABLE: 1
      FS_THR_ENABLE: 0
      FS_TIMEOUT: 0.5
  local_position:
    ros__parameters:
      tf.send: true
      tf.frame_id: "odom"
      tf.child_frame_id: "base_link"

descriptors:
  odom_tf_broadcaster:
    ros__parameters:
      odom_frame_id: "odom"
      base_frame_id: "base_link"
      input_odom_topic: "/mavros/local_position/odom"

sensors:
  ekf_initializer:
    ros__parameters:
      use_gps: false
      home_latitude: 47.65329
      home_longitude: -122.30550
      home_altitude: 0.0
  sllidar_front_node:
    ros__parameters:
      serial_port: "/dev/rplidar0"
      serial_baudrate: 115200
      frame_id: "front_lidar_link"
      angle_compensate: True
  sllidar_back_node:
    ros__parameters:
      serial_port: "/dev/rplidar1"
      serial_baudrate: 115200
      frame_id: "back_lidar_link"
      angle_compensate: True
  lidar_merger_node:
    ros__parameters:
      target_frame: "base_link"
      scan_output: "/scan"
      min_range: 0.2